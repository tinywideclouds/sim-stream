<div class="max-w-6xl mx-auto p-6 bg-white rounded-xl shadow-sm border border-slate-200 mt-8">
  <div class="mb-8 border-b border-slate-200 pb-4">
    <h2 class="text-2xl font-bold text-slate-800">Simulation Ingestion</h2>
    <p class="text-slate-500 mt-1">Upload your engine outputs to begin analysis. The state updates automatically.</p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    
    <div 
      class="relative flex flex-col items-center justify-center p-6 border-2 border-dashed rounded-xl transition-colors hover:border-blue-500 border-slate-300"
      (dragover)="onDragOver($event)" 
      (drop)="onDrop($event, 'actor')">
      
      <div class="text-center text-slate-500">
        <svg class="w-10 h-10 mx-auto mb-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
        <p class="font-medium mb-1">Actor Timeline CSV</p>
        <p class="text-xs mb-4">Drag and drop here</p>
        <button (click)="actorInput.click()" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-medium rounded-md transition-colors">
          + Browse File
        </button>
        <input 
        aria-label="actor"  #actorInput type="file" accept=".csv" class="hidden" (change)="onFileSelected($event, 'actor')">
      </div>
    </div>

    <div 
      class="relative flex flex-col items-center justify-center p-6 border-2 border-dashed rounded-xl transition-colors hover:border-emerald-500 border-slate-300"
      (dragover)="onDragOver($event)" 
      (drop)="onDrop($event, 'meter')">
      
      <div class="text-center text-slate-500">
        <svg class="w-10 h-10 mx-auto mb-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
        <p class="font-medium mb-1">Actor Meters CSV</p>
        <p class="text-xs mb-4">Drag and drop here</p>
        <button (click)="meterInput.click()" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-medium rounded-md transition-colors">
          + Browse File
        </button>
        <input 
        aria-label="meter" 
        #meterInput type="file" accept=".csv" class="hidden" (change)="onFileSelected($event, 'meter')">
      </div>
    </div>

    <div 
      class="relative flex flex-col items-center justify-center p-6 border-2 border-dashed rounded-xl transition-colors hover:border-amber-500 border-slate-300"
      (dragover)="onDragOver($event)" 
      (drop)="onDrop($event, 'power')">
      
      <div class="text-center text-slate-500">
        <svg class="w-10 h-10 mx-auto mb-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
        <p class="font-medium mb-1">Power Usage CSV</p>
        <p class="text-xs mb-4">Drag and drop here</p>
        <button (click)="powerInput.click()" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-medium rounded-md transition-colors">
          + Browse File
        </button>
        <input
        aria-label="power" 
        
        #powerInput type="file" accept=".csv" class="hidden" (change)="onFileSelected($event, 'power')">
      </div>
    </div>

  </div>
</div>
