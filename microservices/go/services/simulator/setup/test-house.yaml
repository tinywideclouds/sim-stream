archetype_id: "test_node_001"
description: "A simple house to test the engine physics."
base_temp_c: 12.0
insulation_decay_rate: 0.15

actors:
  - actor_id: "human_1"
    type: "tester"
  - actor_id: "auto_thermostat"
    type: "system"

devices:
  - device_id: "kettle_1"
    taxonomy:
      category: 1 # Cooking
      class_name: "kettle"
    electrical_profile:
      type: 1 # Constant
      max_watts: 3000.0
      standby_watts: 0.0
      cooldown_duration: "2m"

  - device_id: "heater_1"
    taxonomy:
      category: 2 # Heating
    electrical_profile:
      type: 1 # Constant
      max_watts: 2000.0
      standby_watts: 0.0

scenarios:
  - scenario_id: "make_tea"
    actor_id: "human_1"
    trigger:
      type: 2 # EventReaction
      distribution:
        type: 3 # Constant
        value: "0.80"      # 80% chance...
        timeframe: "1h"    # ...per hour
      fatigue_rule:
        lockout_duration: "30m" # Won't make tea again for at least 30m
    actions:
      - device_id: "kettle_1"
        state: 1 # ON
        parameters:
          duration:
            type: 2 # Uniform
            min: 1.0 
            max: 2.5 
            
  - scenario_id: "heating_thermostat"
    actor_id: "auto_thermostat" 
    trigger:
      type: 2
      distribution:
        type: 3
        value: "1.0" 
      base_conditions:
        - context_key: "node.indoor_temp_c"  # <-- Look at the thermostat on the wall!
          operator: 4 # Less Than (<)
          value: "19.0"                      # <-- Only heat if it drops below 19C
    actions:
      - device_id: "heater_1"
        state: 1
        parameters:
          duration:
            type: 3
            value: "15m"