archetype_id: family_household_standard_002
description: Procedurally generated household
base_temp_c: 18
insulation_decay_rate: 0.1
grid:
    nominal_voltage: 230
    wave_center: 230
    wave_amplitude: 5
    peak_hour: 18
    jitter_min: -1.5
    jitter_max: 1.5
water_system:
    tank_capacity_liters: 250
    mains_water_temp_celsius: 10
    max_tank_temp_celsius: 60
    standby_temperature_loss_tick: 0.003
devices:
    - device_id: freestanding_electric_range_1
      taxonomy:
        category: 1
        class_name: electric_range
      specifics: {}
      electrical_profile:
        type: 1
        max_watts: 8500
        standby_watts: 3
        cooldown_duration: 0
      water_profile: null
    - device_id: microwave_high_power_2
      taxonomy:
        category: 1
        class_name: microwave
      specifics: {}
      electrical_profile:
        type: 1
        max_watts: 1200
        standby_watts: 3
        cooldown_duration: 0
      water_profile: null
    - device_id: kettle_fast_boil_3
      taxonomy:
        category: 1
        class_name: kettle
      specifics: {}
      electrical_profile:
        type: 1
        max_watts: 3000
        standby_watts: 0
        cooldown_duration: 3e+11
      water_profile: null
    - device_id: fridge_freezer_standard_4
      taxonomy:
        category: 3
        class_name: fridge_freezer
      specifics: {}
      electrical_profile:
        type: 1
        max_watts: 150
        standby_watts: 10
        cooldown_duration:
            type: normal
            mean: 2.4e+12
            std_dev: 3e+11
      water_profile: null
    - device_id: gas_combi_boiler_5
      taxonomy:
        category: 2
        class_name: gas_boiler
      specifics: {}
      thermal_profile:
        radiated_watts: 24000
      electrical_profile:
        type: 1
        max_watts: 60
        standby_watts: 5
        cooldown_duration:
            type: normal
            mean: 9e+11
            std_dev: 1.2e+11
      water_profile: null
    - device_id: immersion_heater_standard_6
      taxonomy:
        category: 6
        class_name: immersion_heater
      specifics: {}
      electrical_profile:
        type: 1
        max_watts: 3000
        standby_watts: 0
        cooldown_duration: 1.8e+12
      water_profile: null
    - device_id: mixer_shower_standard_7
      taxonomy:
        category: 5
        class_name: mixer_shower
      specifics: {}
      electrical_profile:
        type: 1
        max_watts: 0
        standby_watts: 0
        cooldown_duration: 0
      water_profile:
        cold_lpm: 4
        hot_lpm: 6
    - device_id: tumble_dryer_vented_8
      taxonomy:
        category: 5
        class_name: tumble_dryer
      specifics: {}
      electrical_profile:
        type: 1
        max_watts: 2500
        standby_watts: 1
        cooldown_duration: 0
      water_profile: null
    - device_id: budget_led_tv_9
      taxonomy:
        category: 4
        class_name: television
      specifics: {}
      electrical_profile:
        type: 1
        max_watts: 55
        standby_watts: 1
        cooldown_duration: 0
      water_profile: null
scenarios:
    - scenario_id: thermostat_heat
      actor_tags:
        - system
      trigger:
        type: 2
        base_conditions:
            - context_key: indoor_temp_c
              operator: <
              value: "18.0"
        fatigue_rule:
            lockout_duration: 1.8e+12
      actions:
        - device_id: gas_combi_boiler_5
          state: 1
          parameters:
            duration: 1.2e+12
    - scenario_id: tank_thermostat
      actor_tags:
        - system
      trigger:
        type: 2
        base_conditions:
            - context_key: tank_temp_c
              operator: <
              value: "45.0"
        fatigue_rule:
            lockout_duration: 3.6e+12
      actions:
        - device_id: immersion_heater_standard_6
          state: 1
          parameters:
            duration: 2.7e+12
    - scenario_id: fridge_compressor_cycle
      actor_tags:
        - system
      trigger:
        type: 1
        base_conditions: []
        fatigue_rule:
            lockout_duration: 2.7e+12
      actions:
        - device_id: fridge_freezer_standard_4
          state: 1
          parameters:
            duration: 9e+11

routine_templates:
    - routine_id: standard_morning_prep
      description: Standard wake up sequence before leaving the house.
      tasks:
        - quick_shower
        - make_hot_drink
        - quick_cold_breakfast
        - brush_teeth_and_wash_face
alarms: []
collective_events:
    - event_id: shared_movie_night
      action: watch_tv
      base_fragility: 0.1
      abort_conditions: []
      lead_actor: office_socialite_1
      dependent_actors:
        - actor_id: child_standard_2
          friction_weight: 0.1
          patience_limit: 10m
    - event_id: sunday_park_trip
      action: visit_park
      base_fragility: 0.2
      abort_conditions:
        - context_key: weather.precipitation_mm
          operator: '>'
          value: "1.0"
        - context_key: weather.external_temp_c
          operator: <
          value: "8.0"
      lead_actor: office_socialite_1
      dependent_actors:
        - actor_id: child_standard_2
          friction_weight: 0.05
          patience_limit: 30m
    - event_id: big_grocery_shop
      action: grocery_shopping
      base_fragility: 0.05
      abort_conditions: []
      lead_actor: office_socialite_1
      dependent_actors:
        - actor_id: child_standard_2
          friction_weight: 0.9
          patience_limit: 5m
    - event_id: weekend_deep_clean
      action: vacuum_and_dust
      base_fragility: 0.2
      abort_conditions: []
      lead_actor: office_socialite_1
      dependent_actors:
        - actor_id: child_standard_2
          friction_weight: 0.95
          patience_limit: 60m
meters:
    - meter_id: energy
      max: 100
      base_decay_per_hour: 4
      curve: linear
    - meter_id: hunger
      max: 100
      base_decay_per_hour: 6
      curve: linear
    - meter_id: hygiene
      max: 100
      base_decay_per_hour: 2
      curve: linear
    - meter_id: leisure
      max: 100
      base_decay_per_hour: 5
      curve: linear
actions:
    - action_id: cook_large_dinner
      actor_tags:
        - adult
        - child
        - elderly
      device_id: freestanding_electric_range_1
      satisfies:
        energy:
            amount: 10
            curve: ease_in
        hunger:
            amount: 70
            curve: linear
      costs:
        energy: 15
      bonus_curves:
        - context_key: time.hour_float
          curve: ""
          peak: 19
          width: 2
          amount: 0
      interruptible: false
      initiation_friction: 20
      sharing:
        type: scalable
        gathering_window: 15m
        duration_multiplier_per_actor: 0.1
        max_participants: 6
      duration:
        type: normal
        mean: 2.7e+12
        std_dev: 6e+11
    - action_id: cook_hot_breakfast
      actor_tags:
        - adult
        - child
        - elderly
      device_id: freestanding_electric_range_1
      satisfies:
        hunger:
            amount: 60
            curve: linear
      costs:
        energy: 5
      bonus_curves:
        - context_key: time.hour_float
          curve: ""
