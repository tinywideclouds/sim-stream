compositions:
  - id: "family_household_standard"
    frequency: 90
    description: "A statistically normal household with working adults and children."
    persona_requirements:
      - type: "adult"
        min: 1
        max: 2
        # Explicitly block students and retirees from acting as the core adults
        exclude_prefixes: ["student_", "retired_"]
      - type: "child"
        min: 1
        max: 3
    required_device_tags:
      - "essential_cooking"
      - "microwave"
      - "hot_beverage"
      - "refrigeration"
      - "heating_system"
      - "water_heating"
      - "shower"
      - "laundry"
      - "television"
    system_ids:
      - "ambient_thermostat"
    required_water_system_tag: "large_residential"
    routine_ids: []
    alarm_ids: []
    event_ids:
      - "family_dinner"
      - "shared_movie_night"
      - "sunday_park_trip"
      - "big_grocery_shop"
      - "weekend_deep_clean"

  - id: "family_household_unconventional"
    frequency: 10
    description: "A chaotic household that might include students or retirees raising kids."
    persona_requirements:
      - type: "adult"
        min: 1
        max: 3
        # No exclusions, anyone can be rolled
      - type: "child"
        min: 1
        max: 2
    required_device_tags:
      - "essential_cooking"
      - "microwave"
      - "hot_beverage"
      - "refrigeration"
      - "heating_system"
      - "water_heating"
      - "shower"
      - "laundry"
      - "television"
    system_ids:
      - "ambient_thermostat"
    required_water_system_tag: "large_residential"
    routine_ids: []
    alarm_ids: []
    event_ids:
      - "family_dinner"
      - "shared_movie_night"
      - "weekend_deep_clean"