devices:
  - id: "washing_machine_standard"
    tags: ["laundry", "wet_cleaning", "chore_appliance"]
    template:
      taxonomy: { category: 5, class_name: "washing_machine" }
      electrical_profile: 
        type: 1
        max_watts: 2000.0 
        standby_watts: 2.0
      water_profile:
        cold_lpm: 2.5 
        hot_lpm: 0.0

  - id: "tumble_dryer_vented"
    tags: ["laundry", "drying", "chore_appliance"]
    template:
      taxonomy: { category: 5, class_name: "tumble_dryer" }
      electrical_profile: 
        type: 1
        max_watts: 2500.0 
        standby_watts: 1.0

  - id: "dishwasher_standard"
    tags: ["dishwashing", "wet_cleaning", "chore_appliance"]
    template:
      taxonomy: { category: 5, class_name: "dishwasher" }
      electrical_profile: 
        type: 1
        max_watts: 1800.0 
        standby_watts: 3.0
      water_profile:
        cold_lpm: 1.5
        hot_lpm: 0.0