devices:
  - id: "electric_shower_9kw"
    tags: ["shower", "wet_cleaning", "electric_water_heating"]
    template:
      taxonomy: { category: 5, class_name: "electric_shower" } 
      electrical_profile: 
        type: 1
        max_watts: 9000.0 
        standby_watts: 0.0
      water_profile:
        cold_lpm: 0.0
        hot_lpm: 8.0 

  - id: "mixer_shower_standard"
    tags: ["shower", "wet_cleaning", "tank_dependent"]
    template:
      taxonomy: { category: 5, class_name: "mixer_shower" }
      electrical_profile: 
        type: 1
        max_watts: 0.0 
        standby_watts: 0.0
      water_profile:
        cold_lpm: 4.0
        hot_lpm: 6.0 

  - id: "standard_bathtub"
    tags: ["bath", "wet_cleaning", "tank_dependent"]
    template:
      taxonomy: { category: 5, class_name: "bathtub" }
      electrical_profile: 
        type: 1
        max_watts: 0.0
        standby_watts: 0.0
      water_profile:
        cold_lpm: 5.0
        hot_lpm: 15.0