    tags: ["cooking_high_load", "oven", "essential_cooking", "gas_appliance"]
    template:
      taxonomy: { category: 1, class_name: "gas_oven" }
      thermal_profile:
        radiated_watts: 2800.0
      electrical_profile: 
        type: 1
        max_watts: 25.0 
        standby_watts: 2.0
  
