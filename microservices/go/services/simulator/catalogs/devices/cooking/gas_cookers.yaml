    tags: ["cooking_high_load", "oven", "hob", "essential_cooking", "gas_appliance"]
    template:
      taxonomy: { category: 1, class_name: "gas_range" }
      thermal_profile:
        radiated_watts: 10000.0
      electrical_profile: 
        type: 1
        max_watts: 40.0 
        standby_watts: 3.0