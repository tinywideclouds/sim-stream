# catalogs/devices/entertainment/displays.yaml
devices:
  - id: "budget_led_tv"
    tags: ["television", "entertainment", "low_draw"]
    template:
      taxonomy: { category: 4 } # Entertainment
      electrical_profile: 
        type: 1
        max_watts: 55.0
        standby_watts: 1.0

  - id: "large_oled_tv"
    tags: ["television", "entertainment", "high_draw"]
    template:
      taxonomy: { category: 4 }
      electrical_profile: 
        type: 1
        max_watts: 200.0
        standby_watts: 15.0 # Smart TVs pull heavily even when "off"