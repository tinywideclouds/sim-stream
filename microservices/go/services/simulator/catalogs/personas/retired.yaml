# catalogs/personas/retired.yaml
personas:
  - id: "retired_standard"
    type: "elderly"
    traits: ["disciplined"]
    frequency: 40
    starting_meters:
      energy: { type: "normal", mean: "70.0", std_dev: "5.0" }
      hunger: { type: "normal", mean: "70.0", std_dev: "5.0" }
      hygiene: { type: "normal", mean: "80.0", std_dev: "5.0" }
      leisure: { type: "normal", mean: "80.0", std_dev: "5.0" }
    biology:
      energy:
        decay_per_hour: { type: "normal", mean: "3.5", std_dev: "0.3" }
        phase_multipliers: { sleep: -8.0 }
      hunger:
        decay_per_hour: { type: "normal", mean: "4.0", std_dev: "0.5" }
        phase_multipliers: { sleep: 0.1 }
      hygiene:
        decay_per_hour: { type: "normal", mean: "1.5", std_dev: "0.2" }
      leisure:
        decay_per_hour: { type: "normal", mean: "3.0", std_dev: "0.5" }
    phases:
      - phase_id: "early_sleep"
        type: "sleep"
        anchor_time: "22:00"
        gravity: 0.1
        duration:
          type: "constant"
          value: "8h"
          flexibility: "2h"
        modifiers:
          application: "continuous"
          effects:
            hygiene: { amount: -15.0, over: "8h", curve: "linear" }
            leisure: { amount: 5.0, over: "8h", curve: "linear" }
      - phase_id: "midday_errands"
        type: "away"
        anchor_time: "10:30"
        gravity: 0.7
        duration: 
          type: "normal" 
          mean: "2h"
          std_dev: "30m"
          flexibility: "1h"
        modifiers:
          application: "block_end"
          effects: 
            hygiene: { amount: -10.0, over: "2h", curve: "linear" }
            leisure: { amount: 10.0, over: "2h", curve: "linear" }

  - id: "retired_homebody"
    type: "elderly"
    traits: ["lazy"]
    frequency: 30
    starting_meters:
      energy: { type: "normal", mean: "60.0", std_dev: "5.0" }
      hunger: { type: "normal", mean: "60.0", std_dev: "5.0" }
      hygiene: { type: "normal", mean: "70.0", std_dev: "5.0" }
      leisure: { type: "normal", mean: "60.0", std_dev: "5.0" }
    biology:
      energy:
        decay_per_hour: { type: "normal", mean: "3.0", std_dev: "0.3" }
        phase_multipliers: { sleep: -8.0 }
      hunger:
        decay_per_hour: { type: "normal", mean: "4.0", std_dev: "0.5" }
        phase_multipliers: { sleep: 0.1 }
      hygiene:
        decay_per_hour: { type: "normal", mean: "1.5", std_dev: "0.2" }
      leisure:
        decay_per_hour: { type: "normal", mean: "4.0", std_dev: "0.5" }
    phases: 
      - phase_id: "long_sleep"
        type: "sleep"
        anchor_time: "22:30"
        gravity: 0.1
        duration:
          type: "constant"
          value: "9h"
          flexibility: "3h"
        modifiers:
          application: "continuous"
          effects:
            hygiene: { amount: -20.0, over: "9h", curve: "linear" }
            leisure: { amount: 5.0, over: "9h", curve: "linear" }

  - id: "retired_active"
    type: "elderly"
    traits: ["disciplined"]
    frequency: 20
    starting_meters:
      energy: { type: "normal", mean: "80.0", std_dev: "5.0" }
      hunger: { type: "normal", mean: "70.0", std_dev: "5.0" }
      hygiene: { type: "normal", mean: "80.0", std_dev: "5.0" }
      leisure: { type: "normal", mean: "60.0", std_dev: "5.0" }
    biology:
      energy:
        decay_per_hour: { type: "normal", mean: "4.5", std_dev: "0.5" }
        phase_multipliers: { sleep: -9.0 }
      hunger:
        decay_per_hour: { type: "normal", mean: "5.0", std_dev: "0.5" }
        phase_multipliers: { sleep: 0.1 }
      hygiene:
        decay_per_hour: { type: "normal", mean: "2.0", std_dev: "0.2" }
      leisure:
        decay_per_hour: { type: "normal", mean: "3.5", std_dev: "0.5" }
    phases:
      - phase_id: "night_sleep"
        type: "sleep"
        anchor_time: "21:30"
        gravity: 0.1
        duration:
          type: "constant"
          value: "7h30m"
          flexibility: "2h"
        modifiers:
          application: "continuous"
          effects:
            hygiene: { amount: -15.0, over: "7h30m", curve: "linear" }
            leisure: { amount: 5.0, over: "7h30m", curve: "linear" }
      - phase_id: "morning_activities"
        type: "away"
        anchor_time: "08:30"
        gravity: 0.8
        duration: 
          type: "normal" 
          mean: "4h"
          std_dev: "20m"
          flexibility: "1h"
        modifiers:
          application: "block_end"
          effects: 
            hygiene: { amount: -40.0, over: "4h", curve: "linear" }
            leisure: { amount: 30.0, over: "4h", curve: "linear" }