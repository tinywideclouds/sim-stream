personas:
  - id: "wfh_standard"
    type: "adult"
    traits: ["disciplined"] 
    frequency: 20
    starting_meters:
      energy: { type: "normal", mean: "85.0", std_dev: "5.0" }
      hunger: { type: "normal", mean: "60.0", std_dev: "5.0" }
      hygiene: { type: "normal", mean: "60.0", std_dev: "5.0" }
      leisure: { type: "normal", mean: "40.0", std_dev: "5.0" }
    biology:
      energy:
        decay_per_hour: { type: "normal", mean: "4.0", std_dev: "0.5" }
        phase_multipliers: { sleep: -10.0 }
      hunger:
        decay_per_hour: { type: "normal", mean: "5.0", std_dev: "0.5" }
        phase_multipliers: { sleep: 0.1 }
      hygiene:
        decay_per_hour: { type: "normal", mean: "2.0", std_dev: "0.2" }
      leisure:
        decay_per_hour: { type: "normal", mean: "4.0", std_dev: "0.5" }
    phases: 
      - phase_id: "night_sleep"
        type: "sleep"
        anchor_time: "23:00"
        gravity: 0.2
        blocks:
          - block_id: "core_sleep"
            probability: 1.0
            duration: { type: "normal", mean: "8h", std_dev: "1h" }
            modifiers:
              hygiene: { amount: -15.0, over: "8h", curve: "linear" }
              leisure: { amount: 5.0, over: "8h", curve: "linear" }
      - phase_id: "wfh_session"
        type: "home" # Valid simulation enum!
        anchor_time: "09:00"
        gravity: 0.8
        blocks:
          - block_id: "work_block"
            probability: 1.0
            duration: { type: "normal", mean: "8h", std_dev: "30m" }
            modifiers:
              leisure: { amount: -30.0, over: "8h", curve: "linear" }

  - id: "wfh_distracted"
    type: "adult"
    traits: ["chaotic", "lazy"] 
    frequency: 20
    starting_meters:
      energy: { type: "normal", mean: "70.0", std_dev: "10.0" }
      hunger: { type: "normal", mean: "40.0", std_dev: "10.0" }
      hygiene: { type: "normal", mean: "40.0", std_dev: "10.0" }
      leisure: { type: "normal", mean: "20.0", std_dev: "10.0" }
    biology:
      energy:
        decay_per_hour: { type: "normal", mean: "3.5", std_dev: "0.5" }
        phase_multipliers: { sleep: -9.0 }
      hunger:
        decay_per_hour: { type: "normal", mean: "5.5", std_dev: "1.0" }
        phase_multipliers: { sleep: 0.1 }
      hygiene:
        decay_per_hour: { type: "normal", mean: "2.5", std_dev: "0.5" }
      leisure:
        decay_per_hour: { type: "normal", mean: "6.0", std_dev: "1.0" }
    phases: 
      - phase_id: "night_sleep"
        type: "sleep"
        anchor_time: "00:00"
        gravity: 0.2
        blocks:
          - block_id: "core_sleep"
            probability: 1.0
            duration: { type: "normal", mean: "8h", std_dev: "1h30m" }
            modifiers:
              hygiene: { amount: -15.0, over: "8h", curve: "linear" }
              leisure: { amount: 5.0, over: "8h", curve: "linear" }
      - phase_id: "wfh_session"
        type: "home"
        anchor_time: "09:30"
        gravity: 0.5 
        blocks:
          - block_id: "work_block"
            probability: 1.0
            duration: { type: "normal", mean: "7h30m", std_dev: "45m" }
            modifiers:
              leisure: { amount: -40.0, over: "7h30m", curve: "linear" }