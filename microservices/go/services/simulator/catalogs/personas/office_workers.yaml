# catalogs/personas/office_workers.yaml
personas:
  - id: "office_standard_9to5"
    type: "adult"
    traits: ["disciplined"]
    frequency: 50
    starting_meters: 
      energy: { mean: 80.0, variance: 5.0 }
      hunger: { mean: 60.0, variance: 10.0 }
      hygiene: { mean: 50.0, variance: 5.0 }
      leisure: { mean: 50.0, variance: 10.0 }
    biology:
      energy:
        decay_per_hour: { type: "normal", mean: "4.0", std_dev: "0.5" }
        phase_multipliers:
          sleep: -10.0 # Deep sleep recovery
      hunger:
        decay_per_hour: { mean: 5.0, variance: 0.8 }
        phase_multipliers:
          sleep: 0.1   # Barely gets hungry while sleeping
      hygiene:
        decay_per_hour: { mean: 2.0, variance: 0.2 }
      leisure:
        decay_per_hour: { mean: 4.0, variance: 1.0 }
    phases:
      - phase_id: "night_sleep"
        type: "sleep"
        anchor_time: "23:00"
        gravity: 0.2
        duration:
          type: 3
          value: "7h30m"
          flexibility: "2h"
      - phase_id: "work_shift"
        type: "away" 
        anchor_time: "08:30"
        gravity: 0.9
        duration: 
          type: 1 
          mean: "9h"
          std_dev: "10m"
          flexibility: "30m"
        modifiers:
          application: "block_end"
          effects: 
            hygiene: { amount: -15.0, over: "9h", curve: "linear" }
            leisure: { amount: -20.0, over: "9h", curve: "linear" }

