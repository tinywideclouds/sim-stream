actions:
  - id: "watch_tv"
    requires_device_tag: "television"
    template:
      action_id: "watch_tv"
      interruptible: true
      initiation_friction: 0.0
      satisfies:
        leisure: { amount: 40.0, curve: "linear" }
      duration: { type: "normal", mean: "1h30m", std_dev: "30m" }

  - id: "play_pc_games"
    requires_device_tag: "gaming_pc"
    template:
      action_id: "play_pc_games"
      interruptible: true
      initiation_friction: 5.0
      satisfies:
        leisure: { amount: 60.0, curve: "linear" }
      costs:
        energy: 10.0
      duration: { type: "normal", mean: "2h", std_dev: "45m" }

  - id: "browse_internet"
    requires_device_tag: "computer"
    template:
      action_id: "browse_internet"
      interruptible: true
      initiation_friction: 2.0
      satisfies:
        leisure: { amount: 25.0, curve: "ease_out" }
      duration: { type: "normal", mean: "45m", std_dev: "15m" }