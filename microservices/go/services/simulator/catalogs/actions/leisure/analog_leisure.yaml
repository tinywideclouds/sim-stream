actions:
  - id: "read_book"
    requires_device_tag: ""
    template:
      action_id: "read_book"
      interruptible: true
      initiation_friction: 5.0
      satisfies:
        leisure: { amount: 35.0, curve: "linear" }
      costs:
        energy: 5.0
      duration: { type: "normal", mean: "1h", std_dev: "15m" }

  - id: "play_board_game"
    requires_device_tag: ""
    template:
      action_id: "play_board_game"
      interruptible: true
      initiation_friction: 15.0
      satisfies:
        leisure: { amount: 50.0, curve: "ease_out" }
      costs:
        energy: 10.0
      duration: { type: "normal", mean: "1h30m", std_dev: "20m" }

  - id: "gardening"
    requires_device_tag: ""
    template:
      action_id: "gardening"
      interruptible: true
      initiation_friction: 20.0
      satisfies:
        leisure: { amount: 60.0, curve: "ease_out" }
      costs:
        energy: 30.0 
        hygiene: 20.0
      duration: { type: "normal", mean: "2h", std_dev: "30m" }
      available_when:
        - context_key: "time.hour"
          operator: ">"
          value: "7.0"
        - context_key: "time.hour"
          operator: "<"
          value: "19.0"