actions:
  - id: "cook_large_dinner"
    requires_device_tag: "essential_cooking"
    template:
      action_id: "cook_large_dinner"
      interruptible: false
      initiation_friction: 20.0 
      sharing:
        type: "scalable"
        gathering_window: "15m"
        duration_multiplier_per_actor: 0.1
        max_participants: 6
      satisfies:
        hunger: { amount: 70.0, curve: "linear" }
        energy: { amount: 10.0, curve: "ease_in" } # Replaced back_loaded
      costs: 
        energy: 15.0 # Scalar shorthand for SampleSpace
      duration: { type: "normal", mean: "45m", std_dev: "10m" }
      bonus_curves:
        - context_key: "time.hour_float"
          peak: 19.0
          width: 2.0
          magnitude: 40.0

  - id: "cook_hot_breakfast"
    requires_device_tag: "essential_cooking"
    template:
      action_id: "cook_hot_breakfast"
      interruptible: false
      initiation_friction: 10.0
      sharing:
        type: "scalable"
        gathering_window: "10m"
        duration_multiplier_per_actor: 0.2
        max_participants: 4
      costs: 
        energy: 5.0
      satisfies:
        hunger: { amount: 60.0, curve: "linear" }
      duration: { type: "normal", mean: "25m", std_dev: "5m" }
      bonus_curves:
        - context_key: "time.hour_float"
          peak: 8.0
          width: 2.0
          magnitude: 30.0

  - id: "make_cold_lunch"
    requires_device_tag: "refrigeration"
    template:
      action_id: "make_cold_lunch"
      interruptible: true
      initiation_friction: 5.0
      satisfies:
        hunger: { amount: 50.0, curve: "linear" }
      duration: { type: "normal", mean: "15m", std_dev: "3m" }
      bonus_curves:
        - context_key: "time.hour_float"
          peak: 13.0
          width: 2.0
          magnitude: 40.0

  - id: "make_hot_lunch"
    requires_device_tag: "essential_cooking"
    template:
      action_id: "make_hot_lunch"
      interruptible: true
      initiation_friction: 10.0
      satisfies:
        hunger: { amount: 60.0, curve: "linear" }
      duration: { type: "normal", mean: "15m", std_dev: "3m" }
      bonus_curves:
        - context_key: "time.hour_float"
          peak: 13.0
          width: 2.0
          magnitude: 40.0