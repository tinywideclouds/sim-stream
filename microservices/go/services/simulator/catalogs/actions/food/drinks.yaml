actions:
  - id: "make_hot_drink"
    requires_device_tag: "hot_beverage"
    template:
      action_id: "make_hot_drink"
      interruptible: true
      initiation_friction: 1.0
      sharing:
        type: "scalable"
        gathering_window: "5m"
        duration_multiplier_per_actor: 0.5 
        max_participants: 4
      satisfies:
        energy: { amount: 8.0, curve: "linear" }
        hunger: { amount: 5.0, curve: "linear" }
      duration: "4m" # New scalar shorthand!
      bonus_curves:
        - context_key: "time.hour_float"
          peak: 7.5
          width: 1.5
          magnitude: 25.0
          
  - id: "get_cold_drink"
    requires_device_tag: "refrigeration"
    template:
      action_id: "get_cold_drink"
      interruptible: true
      initiation_friction: 0.5
      satisfies:
        energy: { amount: 3.0, curve: "ease_out" } # Replaced front_loaded
        hunger: { amount: 3.0, curve: "ease_out" }
      duration: "2m"

  - id: "get_glass_water"
    template:
      action_id: "get_glass_water"
      interruptible: true
      initiation_friction: 0.3
      satisfies:
        energy: { amount: 2.0, curve: "ease_out" }
        hunger: { amount: 2.0, curve: "ease_out" }
      duration: "2m"