# catalogs/schedules/routines.yaml
collective_events:
  - id: "family_dinner"
    selection:
      weight: 0.9 
      default_frequency: "5_per_week"
    template:
      event_id: "family_dinner"
      action: "cook_large_dinner"
      base_fragility: 0.05
      abort_conditions: [] # Rain or shine, people gotta eat
      lead_requirement: "adult"
      dependent_rules:
        - type: "adult"
          friction_weight: 0.5
          patience_limit: "15m"
        - type: "child"
          friction_weight: 0.2
          patience_limit: "5m"