# catalogs/schedules/routines.yaml (The real one)
routines:
  - id: "standard_morning_prep"
    template:
      routine_id: "standard_morning_prep"
      priority: 100 # Overrides pure utility AI
      trigger:
        type: 3 # Triggered by a phase transition
        base_conditions:
          - context_key: "phase.current"
            operator: "=="
            value: "home" # Waking up
          - context_key: "phase.next"
            operator: "=="
            value: "away" # Heading to work/school
      sequence:
        - action_id: "quick_shower"
        - action_id: "make_hot_drink"
        - action_id: "quick_cold_breakfast"
        - action_id: "brush_teeth_and_wash_face"